{% extends 'base.html' %}
{% block title %}Too Many Requests | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="panel-card p-4 p-lg-5 text-center">
      <div class="page-eyebrow">Please Slow Down</div>
      <h1 class="page-title">Too many requests at once</h1>
      <p class="page-subtitle">{{ message }}</p>
      <a href="{{ request.referrer or url_for('main.home') }}" class="btn btn-brand rounded-pill px-4">Go Back</a>
    </div>
  </div>
</div>
{% endblock %}
