{% extends 'base.html' %}
{% block title %}Check Request Status | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-7">
    <div class="panel-card p-4 p-lg-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold mb-2">Check Request Status</h1>
        <p class="text-secondary mb-0">
          Enter the email address you used when requesting your account.
        </p>
      </div>

      <form method="post">
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-brand rounded-pill py-2">Check Status</button>
          <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary rounded-pill py-2">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
