{% extends 'base.html' %}
{% block title %}Add Questionnaire | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9">
    <div class="panel-card p-4 p-lg-5">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h1 class="fw-bold mb-1">Add Questionnaire</h1>
          <p class="text-secondary mb-0">
            {{ student.full_name }} • {{ student.admission_no }} • {{ student.course.program_level }} in {{ student.course.name }}
          </p>
        </div>
        <a href="{{ url_for('students.detail', student_id=student.id) }}" class="btn btn-outline-secondary rounded-pill px-4">
          Back
        </a>
      </div>

      <form method="post">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label">Attendance Frequency</label>
            <select name="attendance_frequency" class="form-select" required>
              <option value="">Select option</option>
              <option value="Always">Always</option>
              <option value="Often">Often</option>
              <option value="Sometimes">Sometimes</option>
              <option value="Rarely">Rarely</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Coursework on Time</label>
            <select name="coursework_on_time" class="form-select" required>
              <option value="">Select option</option>
              <option value="Always">Always</option>
              <option value="Often">Often</option>
              <option value="Sometimes">Sometimes</option>
              <option value="Rarely">Rarely</option>
              <option value="No">No</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Main Challenge</label>
            <select name="main_challenge" class="form-select" required>
              <option value="">Select option</option>
              <option value="None">None</option>
              <option value="Financial">Financial</option>
              <option value="Time Management">Time Management</option>
              <option value="Transport">Transport</option>
              <option value="Family Responsibilities">Family Responsibilities</option>
              <option value="Health">Health</option>
              <option value="Lack of Study Materials">Lack of Study Materials</option>
              <option value="Language Barrier">Language Barrier</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Would Early Warning Help?</label>
            <select name="early_warning_helpful" class="form-select" required>
              <option value="">Select option</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Study Hours Per Week</label>
            <input type="number" step="0.01" min="0" max="100" name="study_hours_per_week" class="form-control" required>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-brand rounded-pill px-4">Save Questionnaire</button>
          <a href="{{ url_for('students.detail', student_id=student.id) }}" class="btn btn-outline-secondary rounded-pill px-4">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
