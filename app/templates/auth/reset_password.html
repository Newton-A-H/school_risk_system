{% extends 'base.html' %}
{% block title %}Reset Password | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 78vh;">
  <div class="col-xl-5 col-lg-6 col-md-8">
    <div class="panel-card p-4 p-lg-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold mb-2">Reset Password</h1>
        <p class="text-secondary mb-0">Choose a new password for your account.</p>
      </div>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" required>
        </div>

        <div class="mb-4">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-brand rounded-pill py-2">Reset Password</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
