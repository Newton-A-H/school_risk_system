{% extends 'base.html' %}
{% block title %}Login | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 78vh;">
  <div class="col-xl-5 col-lg-6 col-md-8">
    <div class="panel-card p-4 p-lg-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold mb-2">Welcome Back</h1>
        <p class="text-secondary mb-0">Sign in to continue to your account.</p>
      </div>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 small">
          <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none">Forgot password?</a>
          <a href="{{ url_for('main.request_status_lookup') }}" class="text-decoration-none">Track request status</a>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-brand rounded-pill py-2">Login</button>
        </div>
      </form>

      <div class="text-center my-4">
        <span class="text-muted small">OR</span>
      </div>

      <div class="d-grid gap-2">
        <a href="{{ url_for('main.request_account') }}" class="btn btn-outline-primary rounded-pill py-2">
          Request an Account
        </a>

        <a href="{{ url_for('main.resend_verification_public') }}" class="btn btn-outline-secondary rounded-pill py-2">
          Resend Verification
        </a>

        <a href="{{ url_for('main.request_status_lookup') }}" class="btn btn-outline-secondary rounded-pill py-2">
          Check Request Status
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
