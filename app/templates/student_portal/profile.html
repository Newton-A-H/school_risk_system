{% extends 'base.html' %}
{% block title %}My Profile | EduSentinel AI{% endblock %}

{% block content %}
<div class="panel-card p-4">
  <div class="page-header">
    <div class="page-header-copy">
      <div class="page-eyebrow">Profile</div>
      <h1 class="page-title">My Profile</h1>
      <p class="page-subtitle">Check your contact details and update them if anything has changed.</p>
    </div>
    <a href="{{ url_for('student_portal.dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">Back</a>
  </div>

  <form method="post" class="row g-4">
    <div class="col-md-6">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" value="{{ student.full_name }}" disabled>
    </div>
    <div class="col-md-6">
      <label class="form-label">Admission Number</label>
      <input type="text" class="form-control" value="{{ student.admission_no }}" disabled>
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ student.email or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ student.phone or '' }}">
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-brand rounded-pill px-4">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
