{% extends 'base.html' %}
{% block title %}New Department | EduSentinel AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-7">
    <div class="panel-card p-4 p-lg-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="fw-bold mb-1">Create Department</h1>
          <p class="text-secondary mb-0">Add a new department to the system.</p>
        </div>
        <a href="{{ url_for('admin.departments') }}" class="btn btn-outline-secondary rounded-pill px-4">Back</a>
      </div>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Department Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-4">
          <label class="form-label">Department Code</label>
          <input type="text" name="code" class="form-control" required>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-brand rounded-pill px-4">Save Department</button>
          <a href="{{ url_for('admin.departments') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
